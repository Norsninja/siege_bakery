<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Bakery 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #app {
        width: 100%;
        height: 100%;
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #fff;
        font: 14px/1.45 system-ui, sans-serif;
        text-shadow: 0 1px 2px #000;
        user-select: none;
        white-space: pre-line;
        /* Like every overlay here: clicks must fall through to the canvas,
           or the pointer-lock click dies on the HUD text (independent
           audit, 2026-07-09). */
        pointer-events: none;
        /* THE REPORT'S COLUMN (plans/15 items 3 + 21): the snapshot frame
           owns top-LEFT min(27vw, 48vh) now (the frame move, 2026-07-12 —
           it was hiding the eat beat at top-right). The photo lives only
           in the linger, when .linger below shifts this whole card out of
           its column; the max-width keeps long lines wrapping sanely.
           border-box: the card's padding must live INSIDE the column. */
        box-sizing: border-box;
        max-width: calc(100vw - min(27vw, 48vh) - 48px);
        /* The UI pass (plans/15 item 5, 2026-07-09): the corner block gets
           a card — same words, better bones. Bright fantasy, pink/cyan. */
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(61, 232, 255, 0.35);
        background: linear-gradient(
          135deg,
          rgba(18, 8, 44, 0.62),
          rgba(18, 8, 44, 0.34)
        );
      }
      /* THE CORNER TIMESHARE (plans/15 item 21): during the linger the
         photo hangs top-left and the (collapsed — hud.ts) card steps
         aside to the photo's right. Same +48px arithmetic as the
         banner's carve: frame padding, border, and the tilt's bounding
         growth. report-view.ts toggles the class on the banner edges. */
      #hud.linger {
        left: calc(min(27vw, 48vh) + 48px);
      }
      /* ── THE POST PANELS (plans/15 item 5 — the UI pass, 2026-07-09).
         post-hud.ts paints; hud.postPanel words. WINCH: dead center, BIG —
         the tensioner's only job is the number. GUNNER: bottom-left free
         real estate — center stays clear for the aim line (visionary
         rulings). Tone: bright pink/cyan fantasy, Vegas energy — glow,
         pop, celebrate the numbers. */
      #post-hud {
        position: fixed;
        display: none;
        pointer-events: none;
        user-select: none;
        color: #fff;
        font: 700 16px/1.35 system-ui, sans-serif;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
        border-radius: 18px;
        border: 1px solid rgba(61, 232, 255, 0.5);
        background: rgba(18, 8, 44, 0.52);
        box-shadow:
          0 0 30px rgba(61, 232, 255, 0.22),
          inset 0 0 26px rgba(255, 79, 216, 0.1);
      }
      #post-hud.winch {
        display: block;
        left: 50%;
        top: 46%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 16px 36px 20px;
      }
      #post-hud.gunner {
        display: block;
        left: 16px;
        bottom: 16px;
        text-align: left;
        padding: 14px 22px 16px;
        max-width: min(46vw, 540px);
      }
      .pp-title {
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.22em;
        color: #3de8ff;
        text-shadow: 0 0 10px rgba(61, 232, 255, 0.8);
      }
      .pp-big {
        font-weight: 900;
        font-size: clamp(64px, 14vh, 128px);
        line-height: 1.05;
        text-shadow:
          0 0 18px rgba(255, 79, 216, 0.9),
          0 0 44px rgba(255, 79, 216, 0.45);
      }
      .pp-max {
        font-size: 0.35em;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.65);
      }
      @keyframes pp-pop {
        from {
          transform: scale(1.28);
          filter: brightness(1.9);
        }
      }
      .pp-pop {
        animation: pp-pop 0.28s cubic-bezier(0.2, 1.6, 0.4, 1);
        display: inline-block;
      }
      .pp-ladder {
        display: flex;
        gap: 5px;
        justify-content: center;
        margin: 10px 0 12px;
      }
      .seg {
        position: relative;
        overflow: hidden;
        width: 26px;
        height: 16px;
        transform: skewX(-14deg);
        border-radius: 3px;
        border: 1px solid rgba(61, 232, 255, 0.35);
        background: rgba(255, 255, 255, 0.1);
      }
      .seg.on {
        background: linear-gradient(180deg, #7ff3ff, #17c8e8);
        box-shadow: 0 0 10px rgba(61, 232, 255, 0.8);
      }
      .seg-fill {
        display: block;
        position: absolute;
        inset: 0;
        width: 0%;
        background: linear-gradient(180deg, #ffa8ec, #ff4fd8);
        box-shadow: 0 0 10px rgba(255, 79, 216, 0.8);
      }
      /* Unwinding DRAINS the top lit segment right-to-left (the honest
         mirror of winding's left-to-right fill — plans/15 item 5 amendment
         2026-07-09: letting out must never wear winding's costume). */
      .seg-drain {
        display: block;
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 0%;
        background: rgba(18, 8, 44, 0.88);
      }
      .pp-keys {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      #post-hud.gunner .pp-keys {
        justify-content: flex-start;
      }
      .pp-hint {
        white-space: nowrap;
      }
      .pp-hint-label {
        margin-left: 6px;
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
      }
      kbd.cap {
        display: inline-block;
        min-width: 14px;
        margin: 0 2px;
        padding: 3px 9px;
        border-radius: 7px;
        border: 1px solid rgba(61, 232, 255, 0.7);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.2),
          rgba(255, 255, 255, 0.05)
        );
        box-shadow:
          0 2px 0 rgba(61, 232, 255, 0.4),
          0 0 8px rgba(61, 232, 255, 0.3);
        font: 800 13px/1.2 system-ui, sans-serif;
        text-align: center;
      }
      .pp-last {
        margin-top: 10px;
        font-weight: 600;
        font-size: 14px;
        color: #ffd76a;
        text-shadow: 0 0 10px rgba(255, 215, 106, 0.5);
      }
      .pp-last b {
        color: #fff;
        font-weight: 900;
      }
      .pp-bucket {
        display: inline-block;
        margin: 8px 0 10px;
        padding: 6px 14px;
        border-radius: 10px;
        font-weight: 900;
        font-size: 17px;
        letter-spacing: 0.06em;
      }
      .pp-bucket.loaded {
        border: 2px solid var(--tc);
        background: color-mix(in srgb, var(--tc) 38%, rgba(0, 0, 0, 0.55));
        box-shadow: 0 0 14px var(--tc);
      }
      @keyframes pp-breathe {
        from {
          opacity: 0.55;
        }
        to {
          opacity: 1;
        }
      }
      .pp-bucket.empty {
        border: 2px dashed rgba(255, 255, 255, 0.45);
        background: rgba(0, 0, 0, 0.35);
        color: rgba(255, 255, 255, 0.65);
        animation: pp-breathe 1.1s ease-in-out infinite alternate;
      }
      .pp-row {
        display: flex;
        gap: 28px;
        margin: 2px 0;
      }
      .pp-stat-label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #3de8ff;
        text-shadow: 0 0 8px rgba(61, 232, 255, 0.6);
      }
      .pp-mid {
        font-weight: 900;
        font-size: clamp(30px, 5.4vh, 52px);
        line-height: 1.05;
        text-shadow:
          0 0 14px rgba(255, 79, 216, 0.85),
          0 0 34px rgba(255, 79, 216, 0.4);
      }
      .pp-trav {
        text-shadow:
          0 0 14px rgba(61, 232, 255, 0.85),
          0 0 34px rgba(61, 232, 255, 0.4);
      }
      .pp-arcglyph {
        margin: 2px 0 6px;
        font-size: 15px;
        letter-spacing: 1px;
        color: #ffb1ea;
      }
      #banner {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        color: #fff;
        /* Shrink the proclamation before it collides (plans/15 item 3):
           3.4vw ties it to width, 5vh to short screens; 42px is the
           full-size voice it had since birth. */
        font: 700 clamp(20px, min(3.4vw, 5vh), 42px)/1.3 system-ui, sans-serif;
        text-shadow: 0 2px 8px #000;
        text-align: center;
        white-space: pre-line;
        pointer-events: none;
        /* THE PROCLAMATION YIELDS THE PHOTO ITS COLUMN (plans/15 item 3,
           measured 2026-07-09 at 1280×800: the centered verdict ran under
           the snapshot frame, which paints later — the report covered its
           own words). The banner and the photo share every linger; the
           text centers in what the frame leaves. MIRRORED LEFT with the
           frame move (item 21, 2026-07-12). */
        /* +48px: the frame is fatter than its width — 16px own padding,
           2px border, and the 1.6° tilt's bounding growth. */
        padding: 0 24px 0 calc(min(27vw, 48vh) + 48px);
      }
      /* The dessert report (plans/09 §1, snapshot form 2026-07-07): a
         framed photo in the corner during the linger — the player keeps
         full control (the switch run must stay open). */
      #snapshot {
        position: fixed;
        top: 12px;
        /* TOP-LEFT since the frame move (plans/15 item 21, 2026-07-12):
           at top-right the photo hung EXACTLY over the eat beat's
           theatre — the giant, the arc, the CHOMP all play screen-right.
           The corner checklist collapses during the linger (hud.ts), so
           the corner is a timeshare. */
        left: 12px;
        /* A <figure>'s default UA margin shoved the frame ~40px off its
           own anchor (measured, plans/15 item 3). */
        margin: 0;
        display: none;
        /* ~10% of a 16:9 screen's area (visionary, 2026-07-07): the trophy
           can afford confidence — it lives only in the linger. The vh cap
           keeps ultrawide screens honest. */
        width: min(27vw, 48vh);
        padding: 8px 8px 6px;
        background: #f5efdf;
        border: 1px solid #b8a888;
        border-radius: 3px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
        /* Tilt mirrored with the corner: a polaroid leans INTO its
           corner, not off the screen edge. */
        transform: rotate(-1.6deg);
        pointer-events: none;
        /* THE POLAROID BEAT (plans/16 slice 7, built with item 21): the
           .moment class below holds it big-and-center; removing the
           class rides this transition up to the corner — the tween ENDS
           inside the column law, it never renegotiates it. */
        transition:
          left 0.5s ease,
          top 0.5s ease,
          width 0.5s ease,
          transform 0.5s ease;
      }
      /* The moment — everyone looks. display none→block skips the
         transition, so the photo APPEARS at full size (the slam), then
         files itself when report-view drops the class. */
      #snapshot.moment {
        left: 50%;
        top: 44%;
        width: min(52vw, 62vh);
        transform: translate(-50%, -50%) rotate(-0.8deg);
      }
      #snapshot img {
        display: block;
        width: 100%;
        border: 1px solid #cabfa4;
      }
      #snapshot figcaption {
        margin-top: 5px;
        color: #4a3f2c;
        font: italic clamp(12px, 1.1vw, 17px)/1.3 Georgia, serif;
        text-align: center;
        white-space: pre-line;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 2px #000;
        pointer-events: none;
      }
      /* The mute button (the UI pass, 2026-07-09): M's clickable twin —
         the iPad rider has no M key. THE ONE overlay with pointer-events
         AUTO (a button is FOR clicking; everything else stays none so the
         pointer-lock grab falls through). It owns top-right alone since
         the frame move (plans/15 item 21) carried the photo to top-left. */
      #mute-btn {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid rgba(61, 232, 255, 0.6);
        background: rgba(18, 8, 44, 0.6);
        box-shadow: 0 0 12px rgba(61, 232, 255, 0.25);
        color: #fff;
        font-size: 19px;
        line-height: 1;
        cursor: pointer;
        user-select: none;
      }
      #mute-btn:hover {
        box-shadow: 0 0 16px rgba(255, 79, 216, 0.5);
        border-color: rgba(255, 79, 216, 0.7);
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="hud">Siege Bakery 3D — loading…</div>
    <!-- The manned post's instruments (plans/15 item 5): before #banner,
         so the proclamation always paints over the panel. -->
    <div id="post-hud"></div>
    <!-- M's clickable twin. It shared top-right with the photo until the
         frame move (plans/15 item 21) — it owns the corner alone now. -->
    <button id="mute-btn" title="music on/off (M)">🔊</button>
    <div id="banner"></div>
    <figure id="snapshot">
      <img alt="the dessert, as the Giant saw it" />
      <figcaption></figcaption>
    </figure>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
