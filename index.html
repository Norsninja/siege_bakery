<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Bakery 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #app {
        width: 100%;
        height: 100%;
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #fff;
        font: 14px/1.4 system-ui, sans-serif;
        text-shadow: 0 1px 2px #000;
        user-select: none;
        white-space: pre-line;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 2px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="hud">Siege Bakery 3D — loading…</div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
