<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Bakery 3D</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #app {
        width: 100%;
        height: 100%;
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #fff;
        font: 14px/1.4 system-ui, sans-serif;
        text-shadow: 0 1px 2px #000;
        user-select: none;
        white-space: pre-line;
        /* Like every overlay here: clicks must fall through to the canvas,
           or the pointer-lock click dies on the HUD text (independent
           audit, 2026-07-09). */
        pointer-events: none;
      }
      #banner {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        color: #fff;
        font: 700 42px/1.3 system-ui, sans-serif;
        text-shadow: 0 2px 8px #000;
        text-align: center;
        white-space: pre-line;
        pointer-events: none;
      }
      /* The dessert report (plans/09 §1, snapshot form 2026-07-07): a
         framed photo in the corner during the linger — the player keeps
         full control (the switch run must stay open). */
      #snapshot {
        position: fixed;
        top: 12px;
        right: 12px;
        display: none;
        /* ~10% of a 16:9 screen's area (visionary, 2026-07-07): the trophy
           can afford confidence — it lives only in the linger. The vh cap
           keeps ultrawide screens honest. */
        width: min(27vw, 48vh);
        padding: 8px 8px 6px;
        background: #f5efdf;
        border: 1px solid #b8a888;
        border-radius: 3px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
        transform: rotate(1.6deg);
        pointer-events: none;
      }
      #snapshot img {
        display: block;
        width: 100%;
        border: 1px solid #cabfa4;
      }
      #snapshot figcaption {
        margin-top: 5px;
        color: #4a3f2c;
        font: italic clamp(12px, 1.1vw, 17px)/1.3 Georgia, serif;
        text-align: center;
        white-space: pre-line;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 2px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="crosshair"></div>
    <div id="hud">Siege Bakery 3D — loading…</div>
    <div id="banner"></div>
    <figure id="snapshot">
      <img alt="the dessert, as the Giant saw it" />
      <figcaption></figcaption>
    </figure>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
